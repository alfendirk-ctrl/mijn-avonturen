name: Bouw en publiceer

# GitHub Pages van dit repo staat op "Deploy from a branch" (main / root) en
# serveert de hoofdmap. Deze workflow bouwt de app bij een broncode-wijziging en
# commit de gebouwde bestanden (index.html + assets) terug naar de hoofdmap,
# zodat Pages de nieuwe versie serveert. Geen handmatige Pages-instelling nodig.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "vite.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Commit gebouwde bestanden
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets index.html manifest.json .nojekyll
          if git diff --staged --quiet; then
            echo "Geen wijzigingen in de build."
          else
            git commit -m "Build: gebouwde app bijwerken [skip ci]"
            git push
          fi
      - name: Controleer live-site
        run: |
          echo "Even wachten tot GitHub Pages de nieuwe versie serveert…"
          sleep 40
          URL="https://alfendirk-ctrl.github.io/mijn-avonturen/"
          curl -sS "$URL" -o /tmp/i.html -w "index: %{http_code}\n"
          echo "--- verwijzingen ---"
          grep -oE '/mijn-avonturen/assets/main\.(js|css)' /tmp/i.html || echo "geen main-assets in index"
          curl -sS -o /dev/null -w "main.js:  %{http_code}\n" "https://alfendirk-ctrl.github.io/mijn-avonturen/assets/main.js"
          curl -sS -o /dev/null -w "main.css: %{http_code}\n" "https://alfendirk-ctrl.github.io/mijn-avonturen/assets/main.css"
