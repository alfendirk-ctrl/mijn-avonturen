name: Deploy naar GitHub Pages

# Bouwt de app en publiceert de dist/-map naar GitHub Pages bij elke push naar main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Slechts één deploy tegelijk; nieuwe pushes annuleren een lopende run niet.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Zet GitHub Pages aan en op "GitHub Actions"-modus (geen handmatige instelling nodig).
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
      # Tijdelijke diagnose: controleer wat de live-site echt serveert.
      - name: Verify live site
        run: |
          BASE="${{ steps.deployment.outputs.page_url }}"
          echo "page_url = $BASE"
          sleep 20
          echo "=== HTTP headers van index ==="
          curl -sS -D - "$BASE" -o /tmp/index.html || echo "curl index faalde"
          echo "=== eerste 2500 tekens van index.html ==="
          head -c 2500 /tmp/index.html; echo
          echo "=== asset-verwijzingen ==="
          grep -oE '(src|href)="[^"]+\.(js|css)"' /tmp/index.html || echo "geen asset refs gevonden"
          for A in $(grep -oE '/[^"]+\.(js|css)' /tmp/index.html); do
            echo -n "asset $A -> "
            curl -sS -o /dev/null -w "%{http_code}\n" "https://alfendirk-ctrl.github.io$A"
          done
